spring.application.name=modihol

# URL kết nối (Thêm các tham số để tránh lỗi SSL và Timezone trên Ubuntu)
spring.datasource.url=jdbc:mysql://localhost:3306/modiholdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456

# Driver mới cho Spring Boot 3.x
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Không cần khai báo Dialect thủ công, Spring Boot 3 sẽ tự nhận diện tốt hơn